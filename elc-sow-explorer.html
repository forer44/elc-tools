function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}
function withAlpha(hex,a){return `rgba(${hexToRgb(hex)},${a})`;}

// MODULES VIEW
// ═══════════════════════════════════════════
function ModulesView(){
  const [selMod,setSelMod]=useState(null);
  const [selArea,setSelArea]=useState(null);
  const [selItem,setSelItem]=useState(null);
  const [search,setSearch]=useState('');
  const [openAreas,setOpenAreas]=useState({});

  const mod=useMemo(()=>selMod!=null?SOW_DATA.modules.find(m=>m.num===selMod):null,[selMod]);

  const areaItems=useMemo(()=>{
    if(!mod) return {};
    const map={};
    SOW_DATA.items.filter(it=>it.m===mod.num).forEach(it=>{
      if(!map[it.area]) map[it.area]=[];
      map[it.area].push(it);
    });
    return map;
  },[mod]);

  const filteredItems=useMemo(()=>{
    if(!selArea) return [];
    const items=areaItems[selArea]||[];
    if(!search) return items;
    const q=search.toLowerCase();
    return items.filter(it=>it.id.toLowerCase().includes(q)||it.desc.toLowerCase().includes(q)||it.area.toLowerCase().includes(q));
  },[selArea,areaItems,search]);

  const globalSearch=useMemo(()=>{
    if(!search||search.length<2) return [];
    const q=search.toLowerCase();
    return SOW_DATA.items.filter(it=>it.id.toLowerCase().includes(q)||it.desc.toLowerCase().includes(q)).slice(0,40);
  },[search]);

  const toggleArea=a=>setOpenAreas(prev=>({...prev,[a]:!prev[a]}));

  // ── Item detail modal ──
  if(selItem){
    const it=selItem;
    const itMod=SOW_DATA.modules.find(m=>m.num===it.m);
    return(
      <div>
        <div className="page-header">
          <div className="back-btn" onClick={()=>setSelItem(null)}>← Back to {selArea||'module'}</div>
          <div className="page-title">{it.id}</div>
          <div className="page-desc">{it.area}</div>
        </div>
        <div className="content">
          <div className="card" style={{borderLeft:`4px solid ${itMod?itMod.color:'#4d8aff'}`}}>
            <div style={{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap'}}>
              <span className="badge" style={{background:withAlpha(itMod?itMod.color:'#4d8aff',0.2),color:itMod?itMod.color:'#4d8aff',fontFamily:'monospace'}}>{it.id}</span>
              {itMod&&<span className="badge" style={{background:withAlpha(itMod.color,0.15),color:itMod.color}}>M{String(itMod.num).padStart(2,'0')} · {itMod.name}</span>}
              <span className="badge" style={{background:'#1e2a3a',color:'#8896b0'}}>Pod {itMod?itMod.pod:'–'}</span>
            </div>
            <div style={{fontSize:14,color:'#e2e8f0',lineHeight:'1.7'}}>{it.desc}</div>
            <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid #1e2a3a'}}>
              <div className="text-xs text-muted">Work Area: <span style={{color:'#a0b4d6'}}>{it.area}</span></div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Area drill-down ──
  if(selArea&&mod){
    return(
      <div>
        <div className="page-header">
          <div className="back-btn" onClick={()=>{setSelArea(null);setSearch('');}}>← Back to {mod.name}</div>
          <div className="page-title">{selArea}</div>
          <div className="page-desc">M{String(mod.num).padStart(2,'0')} · {mod.name} · {(areaItems[selArea]||[]).length} items</div>
        </div>
        <div className="content">
          <div className="search-wrap mb-4">
            <span className="search-icon">⌕</span>
            <input className="search-input" placeholder="Search items…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          {filteredItems.map(it=>(
            <div key={it.id} className="elc-row" style={{borderLeftColor:mod.color}} onClick={()=>setSelItem(it)}>
              <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                <span className="elc-id">{it.id}</span>
                <span style={{color:'#c8d6f0',lineHeight:'1.5'}}>{it.desc}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── Module drill-down ──
  if(mod){
    return(
      <div>
        <div className="page-header" style={{borderLeft:`4px solid ${mod.color}`}}>
          <div className="back-btn" onClick={()=>{setSelMod(null);setSearch('');}}>← All Modules</div>
          <div className="page-title">M{String(mod.num).padStart(2,'0')} · {mod.name}</div>
          <div className="page-desc">Pod {mod.pod} · {mod.count} ELC items · {Object.keys(areaItems).length} work areas</div>
        </div>
        <div className="content">
          {Object.entries(areaItems).map(([area,items])=>(
            <div key={area} style={{marginBottom:8}}>
              <div className="area-header" onClick={()=>toggleArea(area)}>
                <span style={{color:mod.color}}>{openAreas[area]?'▼':'▶'}</span>
                <span style={{flex:1}}>{area}</span>
                <span className="badge" style={{background:withAlpha(mod.color,0.15),color:mod.color}}>{items.length}</span>
                <button className="btn btn-ghost" style={{padding:'2px 10px',fontSize:11}} onClick={e=>{e.stopPropagation();setSelArea(area);}}>View all →</button>
              </div>
              {openAreas[area]&&(
                <div style={{paddingLeft:12}}>
                  {items.slice(0,5).map(it=>(
                    <div key={it.id} className="elc-row" style={{borderLeftColor:mod.color}} onClick={()=>setSelItem(it)}>
                      <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                        <span className="elc-id">{it.id}</span>
                        <span style={{color:'#c8d6f0',lineHeight:'1.5'}}>{it.desc}</span>
                      </div>
                    </div>
                  ))}
                  {items.length>5&&<div className="text-xs text-muted" style={{padding:'6px 12px',cursor:'pointer'}} onClick={()=>setSelArea(area)}>+{items.length-5} more → click to expand</div>}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── Module list (top level) ──
  return(
    <div>
      <div className="page-header">
        <div className="page-title">Modules & Work Items</div>
        <div className="page-desc">Drill into any module to explore work areas and all 398 ELC line items</div>
      </div>
      <div className="content">
        <div className="search-wrap mb-4">
          <span className="search-icon">⌕</span>
          <input className="search-input" placeholder="Search across all 398 ELC items…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        {search.length>=2?(
          <div>
            <div className="section-title">Search results ({globalSearch.length})</div>
            {globalSearch.map(it=>{
              const itMod=SOW_DATA.modules.find(m=>m.num===it.m);
              return(
                <div key={it.id} className="elc-row" style={{borderLeftColor:itMod?itMod.color:'#4d8aff'}} onClick={()=>setSelItem(it)}>
                  <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                    <span className="elc-id">{it.id}</span>
                    <div style={{flex:1}}>
                      <span style={{color:'#c8d6f0',lineHeight:'1.5'}}>{it.desc}</span>
                      {itMod&&<div className="text-xs text-muted" style={{marginTop:2}}>{itMod.name} · {it.area}</div>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12}}>
            {SOW_DATA.modules.map(m=>(
              <div key={m.num} className="hover-card card" style={{borderLeft:`4px solid ${m.color}`,cursor:'pointer'}} onClick={()=>setSelMod(m.num)}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <span style={{fontFamily:'monospace',fontSize:12,fontWeight:800,color:m.color}}>M{String(m.num).padStart(2,'0')}</span>
                  <span className="badge" style={{background:withAlpha(m.color,0.15),color:m.color}}>{m.count}</span>
                </div>
                <div style={{fontWeight:600,fontSize:13,color:'#e2e8f0',marginBottom:6}}>{m.name}</div>
                <div className="text-xs text-muted" style={{marginBottom:8}}>Pod {m.pod} · {m.areas.length} work areas</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                  {m.areas.slice(0,3).map(a=>(
                    <span key={a} style={{fontSize:10,background:'#1e2a3a',color:'#6b7eb5',padding:'1px 6px',borderRadius:3}}>{a.length>22?a.slice(0,22)+'…':a}</span>
                  ))}
                  {m.areas.length>3&&<span style={{fontSize:10,color:'#4d5e80'}}>+{m.areas.length-3} more</span>}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

  return(
    <div>

            {PHASES.map(p=><span key={p.id} className="badge" style={{background:withAlpha(p.color,0.18),color:p.color}}>{p.label}</span>)}
            <div style={{flex:1}}/>
            <div className="text-xs" style={{color:'#6b7eb5',fontWeight:700,letterSpacing:1,marginRight:4}}>STATUS</div>

        {/* Filter chips */}
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
          <span className={`module-chip${selMod===null?' active':''}`}

            <span key={m.num} className="module-chip"

        {/* Milestone rows */}
        {displayMods.map(m=>{
          const ms=MILESTONES[m.num]||[];
          return(
            <div key={m.num} className="card mb-3">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontFamily:'monospace',fontWeight:800,color:m.color}}>M{String(m.num).padStart(2,'0')}</span>
                  <span style={{fontWeight:600,color:'#c8d6f0'}}>{m.name}</span>
                </div>
                <span className="badge" style={{background:withAlpha(m.color,0.15),color:m.color}}>Pod {m.pod}</span>
              </div>
              {ms.map(ms=>(
                <div key={ms.id} className="ms-row">
                  <span className="ms-id" style={{color:statusColor[ms.status]}}>{ms.id}</span>
                  <span className="badge" style={{background:withAlpha(phaseColor[ms.phase]||'#4d8aff',0.18),color:phaseColor[ms.phase]||'#4d8aff',minWidth:30}}>{ms.phase}</span>
                  <span style={{color:'#c8d6f0',flex:1}}>{ms.label}</span>
                  <span className="badge" style={{background:withAlpha(statusColor[ms.status],0.15),color:statusColor[ms.status]}}>{statusLabel[ms.status]}</span>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// GLOSSARY VIEW
// ═══════════════════════════════════════════
function GlossaryView(){
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('all');
  const catColors={org:'#f97316',system:'#3b82f6',tech:'#10b981',commerce:'#f59e0b',finance:'#8b5cf6',compliance:'#ec4899',delivery:'#6b7eb5'};
  const cats=['all','org','system','tech','commerce','finance','compliance','delivery'];

  const filtered=useMemo(()=>{
    let g=GLOSSARY;
    if(filter!=='all') g=g.filter(x=>x.cat===filter);
    if(search) g=g.filter(x=>x.term.toLowerCase().includes(search.toLowerCase())||x.def.toLowerCase().includes(search.toLowerCase()));
    return g.sort((a,b)=>a.term.localeCompare(b.term));
  },[search,filter]);

  return(
    <div>
      <div className="page-header">
        <div className="page-title">Glossary & Legend</div>
        <div className="page-desc">Acronyms, systems, roles and colour codes used across this project</div>
      </div>
      <div className="content">
        {/* Module colour legend */}
        <div className="card mb-4">
          <div className="section-title">◫ Module Colour Legend</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {SOW_DATA.modules.map(m=>(
              <div key={m.num} style={{display:'flex',alignItems:'center',gap:6,background:withAlpha(m.color,0.12),padding:'4px 10px',borderRadius:6,border:`1px solid ${withAlpha(m.color,0.25)}`}}>
                <div style={{width:10,height:10,borderRadius:2,background:m.color}}/>
                <span style={{fontFamily:'monospace',fontSize:11,fontWeight:700,color:m.color}}>M{String(m.num).padStart(2,'0')}</span>
                <span className="text-xs" style={{color:'#a0b4d6'}}>{m.name}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Pod colour legend */}
        <div className="card mb-4">
          <div className="section-title">◉ Pod Colour Legend</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {PODS.map(p=>(
              <div key={p.id} style={{display:'flex',alignItems:'center',gap:6,background:withAlpha(p.color,0.12),padding:'4px 10px',borderRadius:6,border:`1px solid ${withAlpha(p.color,0.25)}`}}>
                <div style={{width:10,height:10,borderRadius:50,background:p.color}}/>
                <span style={{fontWeight:700,fontSize:12,color:p.color}}>{p.label}</span>
                <span className="text-xs" style={{color:'#a0b4d6'}}>{p.lead}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Search + filter */}
        <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
          <div className="search-wrap" style={{flex:'1 1 200px'}}>
            <span className="search-icon">⌕</span>
            <input className="search-input" placeholder="Search terms…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {cats.map(c=>(
              <span key={c} onClick={()=>setFilter(c)} style={{cursor:'pointer',padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:600,
                background:filter===c?(catColors[c]||'#4d8aff'):('#1e2a3a'),
                color:filter===c?'#fff':(catColors[c]||'#6b7eb5'),
                border:`1px solid ${filter===c?(catColors[c]||'#4d8aff'):'#1e2a3a'}`
              }}>{c}</span>
            ))}
          </div>
        </div>

        {/* Terms table */}
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {filtered.map(g=>(
            <div key={g.term} style={{display:'flex',gap:14,padding:'10px 14px',background:'#0d1425',borderRadius:6,alignItems:'flex-start',borderLeft:`3px solid ${catColors[g.cat]||'#4d8aff'}`}}>
              <div style={{minWidth:120,fontWeight:700,fontFamily:'monospace',color:catColors[g.cat]||'#4d8aff',fontSize:13}}>{g.term}</div>
              <div style={{flex:1,fontSize:13,color:'#c8d6f0',lineHeight:'1.6'}}>{g.def}</div>
              <span className="badge" style={{background:withAlpha(catColors[g.cat]||'#4d8aff',0.15),color:catColors[g.cat]||'#4d8aff',flexShrink:0}}>{g.cat}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// TIMELINE VIEW
// ═══════════════════════════════════════════
function TimelineView(){
  const phases=[
    {id:1,label:'Phase 1',weeks:'Wk 1–12',color:'#4f46e5'},
    {id:2,label:'Phase 2',weeks:'Wk 13–24',color:'#0891b2'},
    {id:3,label:'Phase 3',weeks:'Wk 25–36',color:'#d97706'},
    {id:4,label:'Phase 4',weeks:'Wk 37–48',color:'#059669'},
  ];
  const [selected,setSelected]=React.useState(null);
  const mods=SOW_DATA.modules;
  const phaseModules=(phaseId)=>mods.filter(m=>{
    const node=MODULE_DEPS.nodes.find(n=>n.id==='m'+m.num);
    return node&&node.phases.includes(phaseId);
  });
  const selMod=selected?mods.find(m=>m.num===selected):null;
  const selItems=selected!==null?SOW_DATA.items.filter(i=>i.m===selected):[];
  const areaGroups=selMod?selMod.areas.map(a=>({
    area:a,
    items:selItems.filter(i=>i.area===a)
  })):[];
  return(
    <div style={{padding:'24px',overflowY:'auto',height:'100%',boxSizing:'border-box'}}>
      <h2 style={{color:'#e2e8f0',marginBottom:4,fontSize:20}}>Timeline</h2>
      <p style={{color:'#64748b',marginBottom:24,fontSize:13}}>13 modules across 4 phases · 48 weeks · click a module to drill in</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:32}}>
        {phases.map(ph=>{
          const pMods=phaseModules(ph.id);
          return(
            <div key={ph.id} style={{background:'#1e293b',borderRadius:10,overflow:'hidden',border:`1px solid ${withAlpha(ph.color,0.3)}`}}>
              <div style={{background:withAlpha(ph.color,0.2),padding:'10px 14px',borderBottom:`1px solid ${withAlpha(ph.color,0.3)}`}}>
                <div style={{color:ph.color,fontWeight:700,fontSize:13}}>{ph.label}</div>
                <div style={{color:'#94a3b8',fontSize:11}}>{ph.weeks}</div>
              </div>
              <div style={{padding:'10px 8px',display:'flex',flexDirection:'column',gap:6}}>
                {pMods.map(m=>(
                  <button key={m.num} onClick={()=>setSelected(selected===m.num?null:m.num)}
                    style={{background:selected===m.num?withAlpha(m.color,0.3):withAlpha(m.color,0.12),
                      border:`1px solid ${withAlpha(m.color,selected===m.num?0.7:0.3)}`,
                      borderRadius:6,padding:'6px 10px',cursor:'pointer',textAlign:'left',
                      color:m.color,fontSize:11,fontWeight:600,transition:'all .15s'}}>
                    <span style={{opacity:.7,marginRight:4}}>M{m.num}</span>{m.name}
                    <span style={{float:'right',color:'#64748b',fontWeight:400}}>{m.count}</span>
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      {selMod&&(
        <div style={{background:'#1e293b',borderRadius:10,border:`1px solid ${withAlpha(selMod.color,0.4)}`,padding:20}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:selMod.color}}/>
            <h3 style={{color:'#e2e8f0',margin:0,fontSize:16}}>M{selMod.num} · {selMod.name}</h3>
            <span style={{color:'#64748b',fontSize:13}}>{selMod.count} items · Pod {selMod.pod}</span>
            <button onClick={()=>setSelected(null)} style={{marginLeft:'auto',background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:18}}>✕</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
            {areaGroups.map(({area,items})=>(
              <div key={area} style={{background:'#0f1117',borderRadius:8,padding:'12px 14px',border:'1px solid #1e293b'}}>
                <div style={{color:selMod.color,fontSize:12,fontWeight:700,marginBottom:8,textTransform:'uppercase',letterSpacing:'.05em'}}>{area} <span style={{color:'#475569',fontWeight:400}}>({items.length})</span></div>
                {items.map(it=>(
                  <div key={it.id} style={{color:'#94a3b8',fontSize:11,padding:'3px 0',borderBottom:'1px solid #1e293b20'}}>
                    <span style={{color:'#475569',marginRight:6}}>{it.id}</span>{it.desc}
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// DEPENDENCY VIEW
// ═══════════════════════════════════════════
function DependencyView(){
  const [tab,setTab]=React.useState('map');
  const [focus,setFocus]=React.useState(null);
  const nodes=MODULE_DEPS.nodes;
  const edges=MODULE_DEPS.edges;
  const tabs=[{id:'map',label:'Module Map'},{id:'matrix',label:'Dependency Matrix'},{id:'cross',label:'Cross-Cutting'}];
  const upstream=(id)=>edges.filter(e=>e.to===id).map(e=>({...nodes.find(n=>n.id===e.from),label:e.label,type:e.type}));
  const downstream=(id)=>edges.filter(e=>e.from===id).map(e=>({...nodes.find(n=>n.id===e.to),label:e.label,type:e.type}));
  const typeColor={enables:'#4f46e5',requires:'#d97706',feeds:'#0891b2',triggers:'#e11d48'};
  return(
    <div style={{padding:'24px',overflowY:'auto',height:'100%',boxSizing:'border-box'}}>
      <h2 style={{color:'#e2e8f0',marginBottom:4,fontSize:20}}>Dependencies</h2>
      <p style={{color:'#64748b',marginBottom:16,fontSize:13}}>13 modules · 25 dependency edges · 8 cross-cutting concerns</p>
      <div style={{display:'flex',gap:8,marginBottom:24}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:'7px 18px',borderRadius:6,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,
              background:tab===t.id?'#4f46e5':'#1e293b',color:tab===t.id?'#fff':'#94a3b8',transition:'all .15s'}}>
            {t.label}
          </button>
        ))}
      </div>
      {tab==='map'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10,marginBottom:20}}>
            {nodes.map(n=>(
              <button key={n.id} onClick={()=>setFocus(focus===n.id?null:n.id)}
                style={{background:focus===n.id?withAlpha(n.color,0.25):withAlpha(n.color,0.1),
                  border:`1px solid ${withAlpha(n.color,focus===n.id?0.8:0.3)}`,
                  borderRadius:8,padding:'10px 14px',cursor:'pointer',textAlign:'left',transition:'all .15s'}}>
                <div style={{color:n.color,fontWeight:700,fontSize:13}}>{n.name}</div>
                <div style={{color:'#64748b',fontSize:11,marginTop:2}}>Pod {n.pod} · Ph {n.phases.join(',')} · {upstream(n.id).length}↑ {downstream(n.id).length}↓</div>
              </button>
            ))}
          </div>
          {focus&&(()=>{
            const fn=nodes.find(n=>n.id===focus);
            const up=upstream(focus);
            const dn=downstream(focus);
            return(
              <div style={{background:'#1e293b',borderRadius:10,padding:20,border:`1px solid ${withAlpha(fn.color,0.4)}`}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
                  <div style={{width:10,height:10,borderRadius:'50%',background:fn.color}}/>
                  <h3 style={{color:'#e2e8f0',margin:0,fontSize:16}}>{fn.name}</h3>
                  <button onClick={()=>setFocus(null)} style={{marginLeft:'auto',background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:18}}>✕</button>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                  <div>
                    <div style={{color:'#64748b',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>Upstream ({up.length})</div>
                    {up.length?up.map((n,i)=>(
                      <div key={i} style={{background:'#0f1117',borderRadius:6,padding:'8px 12px',marginBottom:6,display:'flex',alignItems:'center',gap:8}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:n.color}}/>
                        <span style={{color:'#e2e8f0',fontSize:12,flex:1}}>{n.name}</span>
                        <span style={{color:typeColor[n.type]||'#64748b',fontSize:10,background:withAlpha(typeColor[n.type]||'#64748b',0.15),padding:'2px 6px',borderRadius:4}}>{n.type}</span>
                        <span style={{color:'#475569',fontSize:10}}>{n.label}</span>
                      </div>
                    )):<div style={{color:'#475569',fontSize:12}}>No upstream dependencies</div>}
                  </div>
                  <div>
                    <div style={{color:'#64748b',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>Downstream ({dn.length})</div>
                    {dn.length?dn.map((n,i)=>(
                      <div key={i} style={{background:'#0f1117',borderRadius:6,padding:'8px 12px',marginBottom:6,display:'flex',alignItems:'center',gap:8}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:n.color}}/>
                        <span style={{color:'#e2e8f0',fontSize:12,flex:1}}>{n.name}</span>
                        <span style={{color:typeColor[n.type]||'#64748b',fontSize:10,background:withAlpha(typeColor[n.type]||'#64748b',0.15),padding:'2px 6px',borderRadius:4}}>{n.type}</span>
                        <span style={{color:'#475569',fontSize:10}}>{n.label}</span>
                      </div>
                    )):<div style={{color:'#475569',fontSize:12}}>No downstream dependents</div>}
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      )}
      {tab==='matrix'&&(
        <div style={{overflowX:'auto'}}>
          <table style={{borderCollapse:'collapse',fontSize:10,minWidth:700}}>
            <thead>
              <tr>
                <th style={{padding:'6px 8px',color:'#64748b',textAlign:'left',borderBottom:'1px solid #1e293b',whiteSpace:'nowrap'}}>From → To</th>
                {nodes.map(n=>(
                  <th key={n.id} style={{padding:'4px 6px',color:n.color,textAlign:'center',borderBottom:'1px solid #1e293b',whiteSpace:'nowrap',maxWidth:70,overflow:'hidden',textOverflow:'ellipsis'}} title={n.name}>
                    M{nodes.indexOf(n)}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {nodes.map((from,fi)=>(
                <tr key={from.id}>
                  <td style={{padding:'4px 8px',color:from.color,borderBottom:'1px solid #1e293b1a',whiteSpace:'nowrap',fontSize:11}}>M{fi} {from.name.split(' ').slice(0,2).join(' ')}</td>
                  {nodes.map((to,ti)=>{
                    const edge=edges.find(e=>e.from===from.id&&e.to===to.id);
                    return(
                      <td key={to.id} title={edge?`${from.name} → ${to.name}: ${edge.type} (${edge.label})`:''}
                        style={{padding:'4px 6px',textAlign:'center',borderBottom:'1px solid #1e293b1a',
                          background:edge?withAlpha(typeColor[edge.type]||'#64748b',0.25):'transparent',
                          color:edge?typeColor[edge.type]||'#e2e8f0':'#1e293b',fontSize:9,cursor:edge?'help':'default'}}>
                        {edge?edge.type.slice(0,3):''}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{marginTop:12,display:'flex',gap:12,flexWrap:'wrap'}}>
            {Object.entries(typeColor).map(([type,color])=>(
              <span key={type} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'#94a3b8'}}>
                <span style={{width:12,height:12,borderRadius:2,background:withAlpha(color,0.3),border:`1px solid ${color}`,display:'inline-block'}}/>
                {type}
              </span>
            ))}
          </div>
        </div>
      )}
      {tab==='cross'&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
          {CROSS_CUTTING.map(cc=>(
            <div key={cc.id} style={{background:'#1e293b',borderRadius:10,padding:'16px 18px',border:`1px solid ${withAlpha(cc.color,0.3)}`}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <span style={{fontSize:20}}>{cc.icon}</span>
                <span style={{color:cc.color,fontWeight:700,fontSize:14}}>{cc.name}</span>
              </div>
              <p style={{color:'#94a3b8',fontSize:12,margin:'0 0 12px',lineHeight:1.5}}>{cc.desc}</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {cc.modules.map(mid=>{
                  const n=MODULE_DEPS.nodes.find(n=>n.id===mid);
                  return n?(
                    <span key={mid} style={{background:withAlpha(n.color,0.15),color:n.color,fontSize:10,padding:'2px 8px',borderRadius:4,border:`1px solid ${withAlpha(n.color,0.3)}`}}>
                      {n.name.split(' ').slice(0,2).join(' ')}
                    </span>
                  ):null;
                })}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// BLUEPRINT VIEW
// ═══════════════════════════════════════════
function BlueprintView(){
  const [search,setSearch]=React.useState('');
  const [expanded,setExpanded]=React.useState({});
  const phases=[
    {id:1,label:'Phase 1 — Foundation',color:'#4f46e5',mods:[0,1]},
    {id:2,label:'Phase 2 — Core Integrations',color:'#0891b2',mods:[2,3,4,5]},
    {id:3,label:'Phase 3 — Commerce & Finance',color:'#d97706',mods:[6,7,8,9,10]},
    {id:4,label:'Phase 4 — Reporting & Launch',color:'#059669',mods:[11,12]},
  ];
  const toggle=(key)=>setExpanded(p=>({...p,[key]:!p[key]}));
  const expandAll=()=>{
    const next={};
    phases.forEach(ph=>{
      next[`ph${ph.id}`]=true;
      ph.mods.forEach(mn=>{
        next[`m${mn}`]=true;
        const mod=SOW_DATA.modules.find(m=>m.num===mn);
        if(mod)mod.areas.forEach(a=>{ next[`a${mn}_${a}`]=true; });
      });
    });
    setExpanded(next);
  };
  const collapseAll=()=>setExpanded({});
  const q=search.toLowerCase();
  const matchItem=(it)=>!q||(it.desc.toLowerCase().includes(q)||it.id.toLowerCase().includes(q));
  const matchArea=(mod,area)=>!q||SOW_DATA.items.filter(i=>i.m===mod.num&&i.area===area).some(matchItem);
  const matchMod=(mod)=>!q||(mod.name.toLowerCase().includes(q)||mod.areas.some(a=>matchArea(mod,a)));
  return(
    <div style={{padding:'24px',overflowY:'auto',height:'100%',boxSizing:'border-box'}}>
      <h2 style={{color:'#e2e8f0',marginBottom:4,fontSize:20}}>Blueprint</h2>
      <p style={{color:'#64748b',marginBottom:16,fontSize:13}}>Full SOW hierarchy · Phase → Module → Work Area → ELC Item</p>
      <div style={{display:'flex',gap:8,marginBottom:20,alignItems:'center'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search items, areas, modules…"
          style={{flex:1,background:'#1e293b',border:'1px solid #334155',borderRadius:6,padding:'8px 14px',color:'#e2e8f0',fontSize:13,outline:'none'}}/>
        <button onClick={expandAll} style={{padding:'8px 14px',background:'#1e293b',border:'1px solid #334155',borderRadius:6,color:'#94a3b8',cursor:'pointer',fontSize:12}}>Expand All</button>
        <button onClick={collapseAll} style={{padding:'8px 14px',background:'#1e293b',border:'1px solid #334155',borderRadius:6,color:'#94a3b8',cursor:'pointer',fontSize:12}}>Collapse All</button>
      </div>
      {phases.map(ph=>{
        const phMods=ph.mods.map(mn=>SOW_DATA.modules.find(m=>m.num===mn)).filter(Boolean).filter(matchMod);
        if(!phMods.length)return null;
        const phOpen=expanded[`ph${ph.id}`]||!!q;
        return(
          <div key={ph.id} style={{marginBottom:12,border:`1px solid ${withAlpha(ph.color,0.3)}`,borderRadius:10,overflow:'hidden'}}>
            <div onClick={()=>toggle(`ph${ph.id}`)} style={{background:withAlpha(ph.color,0.15),padding:'12px 16px',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
              <span style={{color:ph.color,fontSize:12}}>{phOpen?'▾':'▸'}</span>
              <span style={{color:ph.color,fontWeight:700,fontSize:14}}>{ph.label}</span>
              <span style={{color:'#475569',fontSize:12,marginLeft:'auto'}}>{ph.mods.length} modules · {ph.mods.reduce((s,mn)=>{const m=SOW_DATA.modules.find(m=>m.num===mn);return s+(m?m.count:0);},0)} items</span>
            </div>
            {phOpen&&phMods.map(mod=>{
              const mOpen=expanded[`m${mod.num}`]||!!q;
              return(
                <div key={mod.num} style={{marginLeft:0,borderTop:`1px solid #1e293b`}}>
                  <div onClick={()=>toggle(`m${mod.num}`)} style={{padding:'10px 16px 10px 28px',cursor:'pointer',display:'flex',alignItems:'center',gap:10,background:'#1e293b60'}}>
                    <span style={{color:mod.color,fontSize:11}}>{mOpen?'▾':'▸'}</span>
                    <div style={{width:8,height:8,borderRadius:'50%',background:mod.color}}/>
                    <span style={{color:'#e2e8f0',fontWeight:600,fontSize:13}}>M{mod.num} · {mod.name}</span>
                    <span style={{color:'#475569',fontSize:11,marginLeft:'auto'}}>Pod {mod.pod} · {mod.count} items</span>
                  </div>
                  {mOpen&&mod.areas.filter(a=>matchArea(mod,a)).map(area=>{
                    const aKey=`a${mod.num}_${area}`;
                    const aOpen=expanded[aKey]||!!q;
                    const aItems=SOW_DATA.items.filter(i=>i.m===mod.num&&i.area===area).filter(matchItem);
                    return(
                      <div key={area} style={{borderTop:'1px solid #1e293b40'}}>
                        <div onClick={()=>toggle(aKey)} style={{padding:'8px 16px 8px 44px',cursor:'pointer',display:'flex',alignItems:'center',gap:8,background:'#0f111780'}}>
                          <span style={{color:'#64748b',fontSize:10}}>{aOpen?'▾':'▸'}</span>
                          <span style={{color:mod.color,fontSize:12,fontWeight:600}}>{area}</span>
                          <span style={{color:'#475569',fontSize:11,marginLeft:'auto'}}>{aItems.length} items</span>
                        </div>
                        {aOpen&&aItems.map(it=>(
                          <div key={it.id} style={{padding:'5px 16px 5px 60px',borderTop:'1px solid #1e293b20',display:'flex',gap:10,alignItems:'flex-start'}}>
                            <span style={{color:'#334155',fontSize:10,minWidth:50,fontFamily:'monospace',paddingTop:1}}>{it.id}</span>
                            <span style={{color:'#94a3b8',fontSize:12,lineHeight:1.45}}>{it.desc}</span>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// DOCUMENT VIEW
// ═══════════════════════════════════════════
function DocumentView(){
  const [expanded,setExpanded]=React.useState({});
  const toggle=id=>setExpanded(e=>({...e,[id]:!e[id]}));
  const COLORS={identity:"#3b82f6",date:"#8b5cf6",financial:"#10b981",contact:"#f59e0b",content:"#6b7280",list:"#ec4899",module:"#06b6d4"};
  const Tag=({label,type="content"})=>(
    <span style={{display:"inline-flex",alignItems:"center",background:COLORS[type]+"22",border:"1px solid "+COLORS[type]+"55",color:COLORS[type],borderRadius:4,padding:"2px 7px",fontSize:10,fontFamily:"monospace",margin:"2px 3px",fontWeight:600,whiteSpace:"nowrap"}}>{label}</span>
  );
  const sections=[
    {id:"cover",icon:"📄",title:"Cover Page",src:"Table 0",desc:"Document header with date, client contacts, agency branding.",
     vars:[{l:"sow_date",t:"date"},{l:"client_name",t:"identity"},{l:"client_contact_name",t:"contact"},{l:"client_contact_title",t:"contact"},{l:"client_contact_2_name",t:"contact"},{l:"client_contact_2_title",t:"contact"},{l:"agency_name",t:"identity"},{l:"project_name",t:"identity"},{l:"phase_label",t:"identity"}],
     blocks:[{b:"Agency Logo / Cover Branding",h:50,v:["agency_name"]},{b:"Document Title + Phase",h:30,v:["project_name","phase_label"]},{b:"Date Prepared",h:20,v:["sow_date"]},{b:"Prepared For (Client Contacts)",h:35,v:["client_name","client_contact_name","client_contact_title","client_contact_2_name","client_contact_2_title"]},{b:"Prepared By (Agency)",h:22,v:["agency_name"]}]},
    {id:"project",icon:"🏷",title:"Project Details",src:"Table 1",desc:"Client name, project name, phase label, and timeline targets.",
     vars:[{l:"client_name",t:"identity"},{l:"project_name",t:"identity"},{l:"phase_label",t:"identity"},{l:"target_kickoff",t:"date"},{l:"target_launch",t:"date"}],
     blocks:[{b:"Client Name",h:22,v:["client_name"]},{b:"Project Name + Phase",h:22,v:["project_name","phase_label"]},{b:"Target Kickoff / Target Launch",h:22,v:["target_kickoff","target_launch"]}]},
    {id:"phase",icon:"📝",title:"Phase Description",src:"Table 2",desc:"Narrative description of this phase scope, rationale, and foundation context.",
     vars:[{l:"phase_description",t:"content"},{l:"phase_scope_summary",t:"content"}],
     blocks:[{b:"Long-form Phase Narrative",h:70,v:["phase_description","phase_scope_summary"]}]},
    {id:"toc",icon:"📑",title:"Table of Contents",src:"Table 3",desc:"Module list (00-12) forming the SOW structure.",
     vars:[{l:"modules[]",t:"module"},{l:"module_name x13",t:"module"}],
     blocks:[{b:"Module 00 - Discovery and Planning",h:18,v:["module_name"]},{b:"Module 01-12 ...",h:55,v:["modules[]"]}]},
    {id:"budget",icon:"💰",title:"Budget Summary",src:"Tables 4-5",desc:"Per-module fees, subtotal, GST status, and total USD.",
     vars:[{l:"modules[]",t:"module"},{l:"subtotal_usd",t:"financial"},{l:"gst_status",t:"financial"},{l:"total_usd",t:"financial"}],
     blocks:[{b:"Module Fee Rows (13 rows)",h:55,v:["modules[]"]},{b:"Subtotal Row",h:20,v:["subtotal_usd"]},{b:"GST / Tax Row",h:20,v:["gst_status"]},{b:"Total Row",h:24,v:["total_usd"]}]},
    {id:"milestones",icon:"🏁",title:"Module Milestones",src:"Tables 6-18",desc:"Per-module milestone tables (13 modules, 6-17 milestones each).",
     vars:[{l:"module_name",t:"module"},{l:"milestone_id[]",t:"identity"},{l:"milestone_description[]",t:"content"}],
     blocks:[{b:"Module Heading",h:22,v:["module_name"]},{b:"Milestone ID | Description rows",h:85,v:["milestone_id[]","milestone_description[]"]},{b:"(x13 modules)",h:16,v:[]}]},
    {id:"lineitems",icon:"🗂",title:"Line Items",src:"Tables 25-37",desc:"431 line items across 13 modules (ELC-001 to ELC-411). Columns: ID, Area, Requirement/Service, Approach.",
     vars:[{l:"item_id",t:"identity"},{l:"area",t:"module"},{l:"requirement_service",t:"content"},{l:"approach",t:"content"}],
     blocks:[{b:"Module Heading",h:22,v:["module_name"]},{b:"ID | Area | Requirement | Approach rows",h:100,v:["item_id","area","requirement_service","approach"]},{b:"(x13 modules, 431 total rows)",h:16,v:[]}]},
    {id:"payment",icon:"💳",title:"Payment Schedule",src:"Table 19",desc:"5-milestone payment schedule with deposit percentage and milestone triggers.",
     vars:[{l:"deposit_pct",t:"financial"},{l:"payment_milestone_name[]",t:"identity"},{l:"payment_milestone_desc[]",t:"content"}],
     blocks:[{b:"Milestone 1 - Deposit",h:22,v:["deposit_pct"]},{b:"Milestones 2-5",h:60,v:["payment_milestone_name[]","payment_milestone_desc[]"]}]},
    {id:"assumptions",icon:"⚠",title:"Assumptions",src:"Table 20",desc:"37 assumption rows. Columns: Assumption, Category, Notes/Dependencies, Owner.",
     vars:[{l:"assumption_text",t:"content"},{l:"assumption_category",t:"identity"},{l:"notes_dependencies",t:"content"},{l:"owner",t:"contact"}],
     blocks:[{b:"Assumption | Category | Notes | Owner",h:100,v:["assumption_text","assumption_category","notes_dependencies","owner"]},{b:"(37 rows)",h:16,v:[]}]},
    {id:"signatures",icon:"✍",title:"Signatures",src:"Tables 21-22",desc:"Client and agency signatory blocks with signature lines and dates.",
     vars:[{l:"client_signatory_name",t:"contact"},{l:"client_signatory_date",t:"date"},{l:"agency_signatory_name",t:"contact"},{l:"agency_signatory_date",t:"date"}],
     blocks:[{b:"Client Signature Block",h:45,v:["client_signatory_name","client_signatory_date"]},{b:"Agency Signature Block",h:45,v:["agency_signatory_name","agency_signatory_date"]}]},
    {id:"team",icon:"👥",title:"Team and Pods",src:"Tables 23-24",desc:"PMO team roles/allocations and pod structure with scope and PMO touchpoints.",
     vars:[{l:"team_role[]",t:"identity"},{l:"allocation[]",t:"content"},{l:"pod_name[]",t:"identity"},{l:"pod_scope[]",t:"content"}],
     blocks:[{b:"PMO Team: Role | Allocation | Scope",h:50,v:["team_role[]","allocation[]"]},{b:"Pod Structure: Pod | Scope | Touchpoints",h:50,v:["pod_name[]","pod_scope[]"]}]},
  ];
  return(
    <div style={{padding:"24px",maxWidth:1100,margin:"0 auto"}}>
      <div style={{marginBottom:20}}>
        <h2 style={{color:"#f1f5f9",fontSize:22,fontWeight:700,margin:0}}>SOW Document Anatomy</h2>
        <p style={{color:"#64748b",fontSize:13,marginTop:6,marginBottom:0}}>Visual map of every section, its source table(s), and the template variables it contains. Click to expand.</p>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20,padding:"10px 16px",background:"#0f1117",borderRadius:8,border:"1px solid #1e293b"}}>
        <span style={{color:"#475569",fontSize:11,alignSelf:"center",marginRight:4}}>TYPE:</span>
        {Object.entries(COLORS).map(([t,c])=>(
          <span key={t} style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:8,height:8,borderRadius:2,background:c,display:"inline-block"}}/>
            <span style={{color:"#94a3b8",fontSize:11}}>{t}</span>
          </span>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {sections.map(sec=>{
          const open=expanded[sec.id];
          return(
            <div key={sec.id} style={{border:"1px solid #1e293b",borderRadius:8,overflow:"hidden",background:"#0a0d14"}}>
              <div onClick={()=>toggle(sec.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",cursor:"pointer",background:open?"#111827":"#0a0d14",borderBottom:open?"1px solid #1e293b":"none",userSelect:"none"}}>
                <span style={{fontSize:16}}>{sec.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:"#f1f5f9",fontSize:13,fontWeight:600}}>{sec.title}</span>
                    <span style={{color:"#334155",fontSize:11,fontFamily:"monospace"}}>{sec.src}</span>
                  </div>
                  <div style={{marginTop:3,display:"flex",flexWrap:"wrap",gap:0}}>
                    {sec.vars.map(v=><Tag key={v.l} label={v.l} type={v.t}/>)}
                  </div>
                </div>
                <span style={{color:"#475569",fontSize:14,marginLeft:8}}>{open?"▲":"▼"}</span>
              </div>
              {open&&(
                <div style={{display:"flex",gap:0}}>
                  <div style={{flex:"0 0 340px",padding:"16px",borderRight:"1px solid #1e293b"}}>
                    <div style={{color:"#475569",fontSize:10,fontWeight:600,letterSpacing:1,marginBottom:10,textTransform:"uppercase"}}>Wireframe</div>
                    <div style={{border:"1px solid #1e293b",borderRadius:6,background:"#0f1117",padding:8,display:"flex",flexDirection:"column",gap:6}}>
                      {sec.blocks.map((wb,wi)=>(
                        <div key={wi} style={{background:"#161b26",border:"1px solid #1e293b",borderRadius:4,minHeight:wb.h,padding:"6px 8px",display:"flex",flexDirection:"column",justifyContent:"center",gap:4}}>
                          <div style={{color:"#475569",fontSize:10,fontFamily:"monospace"}}>{wb.b}</div>
                          {wb.v.length>0&&(
                            <div style={{display:"flex",flexWrap:"wrap",gap:0,marginTop:2}}>
                              {wb.v.map(vl=>{
                                const vv=sec.vars.find(sv=>sv.l===vl);
                                return <Tag key={vl} label={vl} type={vv?vv.t:"content"}/>;
                              })}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                  <div style={{flex:1,padding:"16px"}}>
                    <div style={{color:"#475569",fontSize:10,fontWeight:600,letterSpacing:1,marginBottom:10,textTransform:"uppercase"}}>Variables in this section</div>
                    <div style={{color:"#94a3b8",fontSize:12,marginBottom:12,lineHeight:1.6}}>{sec.desc}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {sec.vars.map(v=>(
                        <div key={v.l} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 12px",background:"#0f1117",border:"1px solid #1e293b",borderRadius:6}}>
                          <span style={{width:10,height:10,borderRadius:2,background:COLORS[v.t],marginTop:3,flexShrink:0}}/>
                          <div>
                            <div style={{fontFamily:"monospace",color:"#e2e8f0",fontSize:12,fontWeight:600}}>{v.l}</div>
                            <div style={{color:"#475569",fontSize:10,marginTop:1}}>{v.t}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{marginTop:20,padding:"12px 16px",background:"#0f1117",borderRadius:8,border:"1px solid #1e293b",display:"flex",gap:32,flexWrap:"wrap"}}>
        {[["Sections",sections.length],["Source Tables","38"],["Total Line Items","431"],["Variables","~30"]].map(([k,v])=>(
          <div key={k}><div style={{color:"#475569",fontSize:10,textTransform:"uppercase",letterSpacing:1}}>{k}</div><div style={{color:"#f1f5f9",fontSize:20,fontWeight:700}}>{v}</div></div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════
function App(){
  const [view,setView]=useState('overview');
  const views={
    overview:<OverviewView setView={setView}/>,
    org:<OrgView/>,
    modules:<ModulesView/>,
    milestones:<MilestonesView/>,
    glossary:<GlossaryView/>,
    timeline:<TimelineView/>,
    dependencies:<DependencyView/>,
    blueprint:<BlueprintView/>,
    variables:<VariablesView/>,
    document:<DocumentView/>,
  };
  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar view={view} setView={setView}/>
      <div className="main">{views[view]||views.overview}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
