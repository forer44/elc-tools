<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Teifi Document Anatomy · Agentify SE</title>
<script src="./libs/react.js"></script>
<script src="./libs/react-dom.js"></script>
<script src="./libs/babel.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F1F5F9;color:#1E293B;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
/* Sidebar */
.sidebar{width:234px;min-width:234px;background:#0F172A;color:#CBD5E1;display:flex;flex-direction:column;overflow:hidden}
.sidebar-logo{padding:16px 16px 10px;border-bottom:1px solid #1E293B}
.sidebar-logo-text{font-size:15px;font-weight:700;color:#F1F5F9;letter-spacing:-.3px}
.sidebar-logo-sub{font-size:10px;color:#475569;margin-top:2px;text-transform:uppercase;letter-spacing:.8px}
.sidebar-section-label{font-size:9px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.8px;padding:14px 16px 5px}
.sidebar-tabs{flex:1;overflow-y:auto;padding-bottom:12px}
.sidebar-tabs::-webkit-scrollbar{width:4px}
.sidebar-tabs::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.sidebar-tab{display:flex;align-items:center;gap:9px;padding:7px 16px;cursor:pointer;font-size:12.5px;color:#94A3B8;transition:all .15s;border-left:3px solid transparent;line-height:1.3}
.sidebar-tab:hover{background:#1E293B;color:#E2E8F0}
.sidebar-tab.active{background:#1E3A5F;color:#60A5FA;border-left-color:#3B82F6;font-weight:500}
.sidebar-tab-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sidebar-tab-name{flex:1;min-width:0}
.sidebar-tab-badge{font-size:9px;background:#334155;color:#94A3B8;padding:1px 5px;border-radius:8px;flex-shrink:0}
.sidebar-tab.active .sidebar-tab-badge{background:#1D4ED8;color:#BFDBFE}
.sidebar-divider{height:1px;background:#1E293B;margin:6px 0}
/* Main content */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;background:#F8FAFC}
.main-header{background:#fff;border-bottom:1px solid #E2E8F0;padding:14px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.main-header-title{font-size:16px;font-weight:600;color:#0F172A}
.main-header-sub{font-size:12px;color:#64748B;margin-left:4px}
.main-header-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.main-header-variants{display:flex;gap:6px}
.variant-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:#F1F5F9;color:#64748B;border:1px solid #E2E8F0;font-weight:500}
.ctrl-btn{font-size:11px;padding:5px 11px;border:1px solid #E2E8F0;border-radius:6px;background:#fff;color:#475569;cursor:pointer;font-weight:500;transition:all .12s}
.ctrl-btn:hover{background:#F8FAFC;border-color:#CBD5E1}
.ctrl-btn.intel-active{background:#EFF6FF;border-color:#93C5FD;color:#1D4ED8}
.main-scroll{flex:1;overflow-y:auto;padding:20px 24px 40px}
.main-scroll::-webkit-scrollbar{width:6px}
.main-scroll::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
/* Document paper */
.doc-paper{max-width:820px;margin:0 auto;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);overflow:hidden}
/* Cover */
.doc-cover{background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 100%);padding:36px 36px 28px;color:#fff}
.doc-cover-label{font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#60A5FA;margin-bottom:8px}
.doc-cover-title{font-size:22px;font-weight:700;color:#F1F5F9;line-height:1.3;margin-bottom:4px}
.doc-cover-subtitle{font-size:12px;color:#94A3B8;margin-bottom:20px}
.cover-fields{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
/* SE Intel Panel */
.se-intel-panel{background:linear-gradient(135deg,#F0FDF4 0%,#F0F9FF 100%);border:1px solid #BBF7D0;border-top:none;padding:0}
.se-intel-header{display:flex;align-items:center;gap:8px;padding:12px 24px 10px;border-bottom:1px solid #D1FAE5;cursor:pointer;user-select:none}
.se-intel-header:hover{background:rgba(16,185,129,.04)}
.se-intel-title{font-size:12px;font-weight:700;color:#065F46;letter-spacing:.3px;text-transform:uppercase;flex:1}
.se-intel-toggle{font-size:11px;color:#059669}
.se-intel-body{padding:14px 24px 18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.se-intel-col{}
.si-label{font-size:9.5px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.si-chips{display:flex;flex-wrap:wrap;gap:4px}
.si-chip{font-size:10.5px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.si-chip-module{background:#DCFCE7;color:#166534;border:1px solid #BBF7D0}
.si-chip-sa{background:#E0F2FE;color:#0369A1;border:1px solid #BAE6FD}
.si-risk{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px}
.risk-low{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.risk-medium{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.risk-high{background:#FEE2E2;color:#9F1239;border:1px solid #FECACA}
.si-confidence{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
.conf-high{background:#D1FAE5;color:#065F46}
.conf-medium{background:#FEF3C7;color:#92400E}
.conf-low{background:#FEE2E2;color:#9F1239}
.si-hours-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.si-hours-row{display:flex;justify-content:space-between;align-items:center;font-size:11px}
.si-hours-role{color:#475569}
.si-hours-val{font-weight:600;color:#1E293B;font-family:'SF Mono',Consolas,monospace;font-size:10.5px}
.si-pipeline-block{grid-column:1/-1;background:rgba(0,0,0,.03);border-radius:6px;padding:10px 12px;border:1px solid rgba(0,0,0,.06)}
.si-pipeline-row{display:flex;gap:8px;align-items:flex-start;font-size:11px;padding:2px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.si-pipeline-row:last-child{border-bottom:none;padding-bottom:0}
.si-pipeline-key{font-weight:600;color:#0369A1;min-width:100px;flex-shrink:0}
.si-pipeline-val{color:#334155;line-height:1.5}
.si-autofill{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.si-autofill-chip{font-size:9.5px;padding:1px 6px;border-radius:8px;background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE;font-family:'SF Mono',Consolas,monospace}
.si-review-chip{font-size:9.5px;padding:1px 6px;border-radius:8px;background:#FFFBEB;color:#92400E;border:1px solid #FDE68A;font-family:'SF Mono',Consolas,monospace}
/* Section */
.doc-section{border-bottom:1px solid #F1F5F9}
.doc-section:last-child{border-bottom:none}
.section-block{border-bottom:1px solid #F1F5F9}
.section-block:last-child{border-bottom:none}
.section-header{display:flex;align-items:center;gap:10px;padding:12px 24px;cursor:pointer;background:#fff;transition:background .12s;user-select:none}
.section-header:hover{background:#F8FAFC}
.section-chevron{font-size:10px;color:#94A3B8;transition:transform .2s;width:12px;flex-shrink:0}
.section-chevron.open{transform:rotate(90deg)}
.section-num{font-size:10px;font-weight:700;color:#94A3B8;min-width:24px}
.section-name{font-size:13px;font-weight:600;color:#1E293B;flex:1}
.section-meta{font-size:10px;color:#94A3B8;background:#F1F5F9;padding:1px 7px;border-radius:8px;white-space:nowrap}
.section-body{padding:0 24px 14px;background:#FAFBFC}
.section-notes{font-size:11px;color:#64748B;font-style:italic;padding:8px 0 4px;line-height:1.5}
/* Block */
.block-item{margin-bottom:8px;border:1px solid #E9EEF4;border-radius:6px;overflow:hidden;background:#fff}
.block-header{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;transition:background .12s}
.block-header:hover{background:#F8FAFC}
.block-type-pill{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:4px;flex-shrink:0}
.pill-table{background:#FEF3C7;color:#92400E}
.pill-para{background:#E0F2FE;color:#0369A1}
.pill-heading{background:#F3E8FF;color:#7C3AED}
.pill-list{background:#ECFDF5;color:#065F46}
.pill-callout{background:#FFF1F2;color:#9F1239}
.pill-signature{background:#F0FDF4;color:#166534}
.block-desc{font-size:12px;color:#475569;flex:1;min-width:0}
.block-notes{font-size:11px;color:#94A3B8;font-style:italic;padding:4px 12px 6px;border-top:1px dashed #F1F5F9;background:#FAFBFC}
.block-vars{display:flex;flex-wrap:wrap;gap:4px;padding:6px 12px 8px;border-top:1px solid #F1F5F9;background:#FAFBFC}
/* Field badges */
.field-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;cursor:pointer;transition:opacity .12s;white-space:nowrap;border:1px solid transparent;display:inline-block}
.field-badge:hover{opacity:.8}
.badge-org{background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE}
.badge-deal{background:#F5F3FF;color:#7C3AED;border-color:#DDD6FE}
.badge-person{background:#ECFDF5;color:#065F46;border-color:#A7F3D0}
.badge-product{background:#FFFBEB;color:#92400E;border-color:#FDE68A}
.badge-datetime{background:#FFF1F2;color:#9F1239;border-color:#FECDD3}
/* Legend */
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:10px 24px;background:#fff;border-top:1px solid #F1F5F9;font-size:11px;flex-shrink:0}
.legend-item{display:flex;align-items:center;gap:5px}
/* Master field list */
.mfl-header{padding:0 0 16px 0}
.mfl-search{display:flex;gap:10px;margin-bottom:14px}
.mfl-search input{flex:1;padding:8px 12px;border:1px solid #E2E8F0;border-radius:6px;font-size:13px;color:#1E293B;outline:none}
.mfl-search input:focus{border-color:#3B82F6;box-shadow:0 0 0 2px #DBEAFE}
.mfl-filter-btn{padding:6px 12px;border:1px solid #E2E8F0;border-radius:6px;background:#fff;font-size:12px;color:#64748B;cursor:pointer;transition:all .12s}
.mfl-filter-btn.active{background:#EFF6FF;border-color:#BFDBFE;color:#1D4ED8}
.field-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.field-table th{background:#F8FAFC;padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #E2E8F0;white-space:nowrap}
.field-table td{padding:10px 14px;font-size:12.5px;color:#1E293B;border-bottom:1px solid #F1F5F9;vertical-align:top}
.field-table tr:last-child td{border-bottom:none}
.field-table tr:hover td{background:#F8FAFC}
.field-table tr.expanded td{background:#F0F9FF}
.field-row-expand{cursor:pointer}
.field-expand-area{padding:0;max-height:0;overflow:hidden;transition:max-height .25s ease}
.field-expand-area.open{max-height:400px}
.field-expand-inner{padding:14px 18px;background:#F0F9FF;border-top:1px solid #DBEAFE;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.formula-block{grid-column:1/-1}
.formula-label{font-size:11px;font-weight:600;color:#1D4ED8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.formula-input-row{display:flex;gap:8px;align-items:center}
.formula-prefix{font-size:13px;font-weight:600;color:#7C3AED;font-family:'SF Mono',Consolas,monospace}
.formula-input{flex:1;padding:6px 10px;border:1px solid #C7D2FE;border-radius:5px;font-size:13px;font-family:'SF Mono',Consolas,monospace;color:#1E293B;background:#fff;outline:none}
.formula-input:focus{border-color:#6366F1;box-shadow:0 0 0 2px #E0E7FF}
.formula-save{padding:5px 12px;background:#3B82F6;color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;transition:background .12s}
.formula-save:hover{background:#2563EB}
.formula-saved{color:#059669;font-size:11px;margin-left:6px;font-weight:600}
.dep-block{}
.dep-label{font-size:11px;font-weight:600;color:#7C3AED;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.dep-chips{display:flex;flex-wrap:wrap;gap:5px;min-height:28px;padding:4px;border:1px solid #E9D5FF;border-radius:5px;background:#fff;cursor:text}
.dep-chip{display:flex;align-items:center;gap:4px;font-size:11px;background:#F5F3FF;color:#7C3AED;border:1px solid #DDD6FE;padding:2px 7px;border-radius:10px}
.dep-chip-remove{cursor:pointer;color:#A78BFA;font-size:12px;line-height:1}
.dep-chip-remove:hover{color:#7C3AED}
.dep-add-input{border:none;outline:none;font-size:12px;flex:1;min-width:80px;padding:2px 4px;color:#1E293B}
.blocks-block{}
.blocks-label{font-size:11px;font-weight:600;color:#DC2626;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.blocks-chips{display:flex;flex-wrap:wrap;gap:5px;min-height:28px;padding:4px;border:1px solid #FECACA;border-radius:5px;background:#fff;cursor:text}
.blocks-chip{display:flex;align-items:center;gap:4px;font-size:11px;background:#FFF1F2;color:#DC2626;border:1px solid #FECACA;padding:2px 7px;border-radius:10px}
.template-dots{display:flex;gap:3px;flex-wrap:wrap}
.tdot{width:18px;height:18px;border-radius:3px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;cursor:default;flex-shrink:0}
.field-source-key{font-size:10px;color:#94A3B8;font-family:'SF Mono',Consolas,monospace;margin-top:2px}
.empty-state{text-align:center;padding:40px;color:#94A3B8;font-size:13px}
.tab-count-badge{font-size:10px;background:#1D4ED8;color:#BFDBFE;padding:1px 6px;border-radius:8px;margin-left:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback, useRef, useEffect } = React;


const FTYPE = {
  org_custom:  { label:'Org Custom',  color:'#6366F1', bg:'#EEF2FF', desc:'Custom org data from CRM/HubSpot account record' },
  org_name:    { label:'Org Name',    color:'#7C3AED', bg:'#F5F3FF', desc:'Auto-populated Red Wireless legal entity name' },
  deal_custom: { label:'Deal Custom', color:'#0EA5E9', bg:'#E0F2FE', desc:'Deal-specific fields from CRM opportunity record' },
  person:      { label:'Person',      color:'#10B981', bg:'#D1FAE5', desc:'Contact / signatory person fields from CRM' },
  product:     { label:'Product',     color:'#F59E0B', bg:'#FEF3C7', desc:'Product line items from CPQ / quote object' },
  datetime:    { label:'Date/Time',   color:'#EF4444', bg:'#FEE2E2', desc:'Auto-generated date/time stamps at doc creation' },
};

const ALL_FIELDS = [
  { key:'client_name',         type:'org_custom',  label:'Client Company Name',      desc:'Legal entity name from CRM account record' },
  { key:'client_address',      type:'org_custom',  label:'Client Street Address',    desc:'Billing street address on file in CRM' },
  { key:'client_city_state',   type:'org_custom',  label:'City / State / ZIP',       desc:'City, state and postal code' },
  { key:'client_country',      type:'org_custom',  label:'Client Country',           desc:'Country for international agreement headers' },
  { key:'client_phone',        type:'org_custom',  label:'Client Phone',             desc:'Primary contact phone from CRM account' },
  { key:'client_website',      type:'org_custom',  label:'Client Website',           desc:'Primary website URL from CRM account' },
  { key:'client_industry',     type:'org_custom',  label:'Client Industry',          desc:'Industry vertical from CRM account field' },
  { key:'client_size',         type:'org_custom',  label:'Client Company Size',      desc:'Employee count / size tier from CRM' },
  { key:'org_display_name',    type:'org_name',    label:'Red Wireless Entity Name', desc:'Auto-populated RW legal entity per region' },
  { key:'deal_title',          type:'deal_custom', label:'Deal / Project Title',     desc:'Short engagement name from opportunity' },
  { key:'deal_value',          type:'deal_custom', label:'Total Contract Value',     desc:'TCV in USD from opportunity record' },
  { key:'deal_start_date',     type:'deal_custom', label:'Project Start Date',       desc:'Contracted engagement start date' },
  { key:'deal_end_date',       type:'deal_custom', label:'Project End Date',         desc:'Contracted end / go-live date' },
  { key:'deal_type',           type:'deal_custom', label:'Deal Type',                desc:'New Business / Expansion / Renewal' },
  { key:'deal_owner',          type:'deal_custom', label:'Account Executive',        desc:'Owning AE name from CRM opportunity' },
  { key:'deal_stage',          type:'deal_custom', label:'CRM Pipeline Stage',       desc:'Pipeline stage at document creation time' },
  { key:'payment_terms',       type:'deal_custom', label:'Payment Terms',            desc:'Net 30 / Net 60 / Upon Signature' },
  { key:'billing_frequency',   type:'deal_custom', label:'Billing Frequency',        desc:'Monthly / Annual / One-time / Milestone' },
  { key:'sow_number',          type:'deal_custom', label:'SOW Reference Number',     desc:'Unique SOW ID generated by deal desk system' },
  { key:'project_description', type:'deal_custom', label:'Project Description',      desc:'Executive summary of engagement scope (AE fills)' },
  { key:'acceptance_criteria', type:'deal_custom', label:'Acceptance Criteria',      desc:'Sign-off conditions for project completion' },
  { key:'change_order_policy', type:'deal_custom', label:'Change Order Policy',      desc:'Policy text for scope changes and addenda' },
  { key:'client_signer_name',  type:'person',      label:'Client Authorized Signer', desc:'Full legal name of client signatory' },
  { key:'client_signer_title', type:'person',      label:'Client Signer Title',      desc:'Job title / role of signing contact' },
  { key:'client_signer_email', type:'person',      label:'Client Signer Email',      desc:'Email address for e-signature workflow routing' },
  { key:'product_name',        type:'product',     label:'Product / Service Name',   desc:'Line item name from CPQ / quote object' },
  { key:'product_qty',         type:'product',     label:'Quantity',                 desc:'Unit quantity on the line item' },
  { key:'product_unit_price',  type:'product',     label:'Unit Price',               desc:'Per-unit price from CPQ pricing engine' },
  { key:'product_subtotal',    type:'product',     label:'Line Subtotal',            desc:'Calculated: quantity × unit price' },
  { key:'product_sku',         type:'product',     label:'Product SKU / ID',         desc:'Internal SKU or catalog identifier' },
  { key:'product_description', type:'product',     label:'Product Description',      desc:'Full description text from product catalog' },
  { key:'product_category',    type:'product',     label:'Product Category',         desc:'Category for grouping on invoice / quote' },
  { key:'product_license',     type:'product',     label:'License Type',             desc:'Perpetual / Subscription / Usage-based' },
  { key:'doc_date',            type:'datetime',    label:'Document Date',            desc:'Auto-generated timestamp at doc creation' },
];

// ── helper refs used in seIntel ──────────────────────────────────────────────
const AUTO_ALL = ['org_display_name','client_name','client_address','client_city_state','client_phone','client_website','client_industry','client_size','deal_title','deal_value','deal_start_date','deal_end_date','deal_type','deal_owner','deal_stage','payment_terms','billing_frequency','sow_number','product_name','product_qty','product_unit_price','product_subtotal','product_sku','product_category','product_license','doc_date','client_signer_name','client_signer_title','client_signer_email'];
const REVIEW_SCOPE = ['project_description','acceptance_criteria','change_order_policy'];

const TEMPLATES = [
// ── 1. SOW – Implementation ──────────────────────────────────────────────────
{ id:'sow_implementation', label:'SOW – Implementation', category:'SOW',
  description:'Standard Statement of Work for new platform implementation engagements. Covers scope, deliverables, timeline, pricing, and acceptance criteria.',
  sections:[
    { id:'cover', title:'Cover Page', defaultOpen:true, blocks:[
      { type:'heading', text:'Statement of Work' },
      { type:'paragraph', text:'This Statement of Work ("SOW") is entered into between {{org_display_name}} ("Red Wireless") and {{client_name}} ("Client"), effective {{doc_date}}, and is governed by the Master Services Agreement on file.', fields:['org_display_name','client_name','doc_date'] },
      { type:'callout', text:'SOW #{{sow_number}} · Deal Type: {{deal_type}} · AE: {{deal_owner}} · Stage: {{deal_stage}}', fields:['sow_number','deal_type','deal_owner','deal_stage'] },
    ]},
    { id:'parties', title:'Parties & Contact Details', defaultOpen:false, blocks:[
      { type:'table', headers:['Field','Client','Red Wireless'], rows:[
        ['Legal Name','{{client_name}}','{{org_display_name}}'],
        ['Address','{{client_address}}','Refer to signature block'],
        ['City / State / ZIP','{{client_city_state}}','—'],
        ['Phone','{{client_phone}}','—'],
        ['Website','{{client_website}}','redwireless.com'],
        ['Industry','{{client_industry}}','Wireless / Technology'],
      ], fields:['client_name','org_display_name','client_address','client_city_state','client_phone','client_website','client_industry'] },
    ]},
    { id:'scope', title:'Scope of Work', defaultOpen:false, blocks:[
      { type:'paragraph', text:'{{project_description}}', fields:['project_description'] },
      { type:'list', items:['Discovery: requirements gathering, stakeholder workshops, and current-state analysis','Configuration: platform setup, integrations, and workflow automation build-out','Testing: unit testing, integration testing, and user acceptance testing (UAT)','Go-live: deployment to production, hypercare support, and knowledge transfer'], fields:[] },
    ]},
    { id:'deliverables', title:'Deliverables & Timeline', defaultOpen:false, blocks:[
      { type:'table', headers:['Milestone','Target Date','Owner','Notes'], rows:[
        ['Project Kickoff','{{deal_start_date}}','Red Wireless','Kickoff deck + RACI delivered'],
        ['Discovery Complete','TBD','Red Wireless','Requirements doc signed off by Client'],
        ['Configuration Build','TBD','Red Wireless','UAT environment available'],
        ['UAT Sign-off','TBD','Client','Written acceptance required'],
        ['Production Go-live','{{deal_end_date}}','Red Wireless','Hypercare begins (30 days)'],
      ], fields:['deal_start_date','deal_end_date'] },
    ]},
    { id:'pricing', title:'Pricing & Payment', defaultOpen:false, blocks:[

                fontSize:'10px', background: usage > 0 ? '#EEF2FF' : '#F3F4F6',
                color: usage > 0 ? '#6366F1' : '#9CA3AF',
                padding:'1px 6px', borderRadius:'8px', fontWeight:600, whiteSpace:'nowrap'
              }}, usage > 0 ? `${usage}× used` : 'unused')
            ),
            React.createElement('div', { style:{ fontSize:'12px', fontWeight:600, color:'#1E293B', marginBottom:'2px' } }, f.label),
            React.createElement('div', { style:{ fontSize:'11px', color:'#64748B' } }, f.desc || type.desc),
            React.createElement('span', { style:{
              display:'inline-block', marginTop:'6px', fontSize:'10px', padding:'1px 6px',
              borderRadius:'4px', background: type.bg, color: type.color, fontWeight:600
            }}, type.label)
          );
        })
      ),
      filtered.length === 0 && React.createElement('div', { style:{ textAlign:'center', padding:'32px', color:'#94A3B8', fontSize:'13px' } }, 'No fields match your filter.')
    );
  }

  // ─── App ──────────────────────────────────────────────────────────────────────
  function App() {
    const [selectedId, setSelectedId] = React.useState(TEMPLATES[0].id);
    const [activeTab, setActiveTab]   = React.useState('anatomy');
    const [sidebarSearch, setSidebarSearch] = React.useState('');

    const selected = TEMPLATES.find(t => t.id === selectedId) || TEMPLATES[0];

    const RISK_COLOR = { Low:'#10B981', Medium:'#F59E0B', High:'#EF4444', Critical:'#DC2626' };
    const CAT_COLOR  = {
      sales:'#8B5CF6', legal:'#0EA5E9', commercial:'#F97316',
      support:'#10B981', technical:'#64748B', proposal:'#EC4899'
    };

    const filteredTemplates = TEMPLATES.filter(t => {
      if (!sidebarSearch) return true;
      return t.label.toLowerCase().includes(sidebarSearch.toLowerCase()) ||
             t.category.toLowerCase().includes(sidebarSearch.toLowerCase());
    });

    // Group templates by category for sidebar display
    const grouped = {};
    filteredTemplates.forEach(t => {
      if (!grouped[t.category]) grouped[t.category] = [];
      grouped[t.category].push(t);
    });

    const catLabels = {
      sales:'Sales', legal:'Legal', commercial:'Commercial',
      support:'Support', technical:'Technical', proposal:'Proposal'
    };

    return React.createElement('div', { style:{
      display:'flex', height:'100vh', overflow:'hidden', fontFamily: "'Inter', sans-serif",
      background:'#F8FAFC'
    }},

      // ── Sidebar ────────────────────────────────────────────────────────────────
      React.createElement('aside', { style:{
        width:'260px', minWidth:'260px', background:'#0F172A', color:'#E2E8F0',
        display:'flex', flexDirection:'column', overflow:'hidden', borderRight:'1px solid #1E293B'
      }},

        // Logo / header
        React.createElement('div', { style:{
          padding:'16px 14px 12px', borderBottom:'1px solid #1E293B', flexShrink:0
        }},
          React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'4px' }},
            React.createElement('span', { style:{ fontSize:'18px' }}, '⚡'),
            React.createElement('span', { style:{ fontWeight:700, fontSize:'14px', color:'#F1F5F9', letterSpacing:'-0.3px' }}, 'Agentify'),
            React.createElement('span', { style:{ fontSize:'11px', background:'#312E81', color:'#A5B4FC', padding:'1px 6px', borderRadius:'4px', fontWeight:600 }}, 'SE')
          ),
          React.createElement('p', { style:{ fontSize:'10px', color:'#64748B', margin:0, lineHeight:1.4 }}, 'Red Wireless · Doc Anatomy Module')
        ),

        // Tab switcher
        React.createElement('div', { style:{ padding:'8px', borderBottom:'1px solid #1E293B', flexShrink:0 }},
          React.createElement('div', { style:{ display:'flex', background:'#1E293B', borderRadius:'6px', padding:'2px', gap:'2px' }},
            ['anatomy','fields'].map(tab =>
              React.createElement('button', {
                key: tab,
                'data-testid': `tab-${tab}`,
                onClick: () => setActiveTab(tab),
                style:{
                  flex:1, padding:'5px 0', borderRadius:'4px', border:'none',
                  fontSize:'11px', fontWeight:600, cursor:'pointer',
                  background: activeTab === tab ? '#3B82F6' : 'transparent',
                  color: activeTab === tab ? '#FFF' : '#64748B',
                  transition:'all 0.15s'
                }
              }, tab === 'anatomy' ? '📄 Anatomy' : '🏷 Fields')
            )
          )
        ),

        // Sidebar search (only for anatomy tab)
        activeTab === 'anatomy' && React.createElement('div', { style:{ padding:'8px 10px', borderBottom:'1px solid #1E293B', flexShrink:0 }},
          React.createElement('input', {
            'data-testid': 'sidebar-search',
            type:'text', placeholder:'Search templates…',
            value: sidebarSearch,
            onChange: e => setSidebarSearch(e.target.value),
            style:{
              width:'100%', boxSizing:'border-box', background:'#1E293B', border:'1px solid #334155',
              borderRadius:'5px', padding:'5px 8px', fontSize:'11px', color:'#E2E8F0',
              outline:'none'
            }
          })
        ),

        // Template list (anatomy) or Field Registry label (fields)
        React.createElement('div', { style:{ flex:1, overflowY:'auto', padding:'6px 0' }},
          activeTab === 'fields'
            ? React.createElement('div', { style:{ padding:'16px 14px', color:'#94A3B8', fontSize:'12px' }},
                React.createElement('div', { style:{ fontWeight:700, color:'#E2E8F0', fontSize:'13px', marginBottom:'6px' }}, '🏷 Field Registry'),
                `${ALL_FIELDS.length} fields across ${TEMPLATES.length} templates`
              )
            : Object.keys(grouped).map(cat =>
                React.createElement('div', { key:cat },
                  React.createElement('div', { style:{
                    padding:'6px 12px 3px', fontSize:'9px', fontWeight:700, letterSpacing:'0.08em',
                    textTransform:'uppercase', color:'#475569'
                  }}, catLabels[cat] || cat),
                  grouped[cat].map(t => {
                    const risk = t.seIntel?.risk || 'Low';
                    const isActive = t.id === selectedId;
                    return React.createElement('button', {
                      key: t.id,
                      'data-testid': `template-btn-${t.id}`,
                      onClick: () => { setSelectedId(t.id); setActiveTab('anatomy'); },
                      style:{
                        width:'100%', textAlign:'left', background: isActive ? '#1E3A5F' : 'transparent',
                        border:'none', borderLeft: isActive ? '3px solid #3B82F6' : '3px solid transparent',
                        padding:'7px 12px', cursor:'pointer', display:'flex', alignItems:'center',
                        gap:'6px', transition:'all 0.12s'
                      }
                    },
                      React.createElement('span', { style:{
                        width:'7px', height:'7px', borderRadius:'50%', flexShrink:0,
                        background: RISK_COLOR[risk] || '#94A3B8'
                      }}),
                      React.createElement('span', { style:{
                        fontSize:'11px', fontWeight: isActive ? 700 : 500,
                        color: isActive ? '#F1F5F9' : '#94A3B8', lineHeight:1.3, flex:1
                      }}, t.label),
                      t.seIntel?.aiConfidence === 'High' && React.createElement('span', { style:{
                        fontSize:'9px', color:'#10B981', fontWeight:700
                      }}, '✦')
                    );
                  })
                )
              )
        ),

        // Footer stats
        React.createElement('div', { style:{
          padding:'10px 12px', borderTop:'1px solid #1E293B', flexShrink:0,
          display:'flex', gap:'12px'
        }},
          [
            { label:'Templates', val: TEMPLATES.length },
            { label:'Fields', val: ALL_FIELDS.length },
            { label:'Modules', val: 14 }
          ].map(s =>
            React.createElement('div', { key:s.label, style:{ textAlign:'center', flex:1 }},
              React.createElement('div', { style:{ fontSize:'14px', fontWeight:700, color:'#E2E8F0' }}, s.val),
              React.createElement('div', { style:{ fontSize:'9px', color:'#475569', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em' }}, s.label)
            )
          )
        )
      ),

      // ── Main Content ───────────────────────────────────────────────────────────
      React.createElement('main', { style:{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }},

        // Top bar
        React.createElement('div', { style:{
          padding:'10px 20px', background:'white', borderBottom:'1px solid #E2E8F0',
          display:'flex', alignItems:'center', gap:'12px', flexShrink:0
        }},
          React.createElement('div', { style:{ flex:1 }},
            React.createElement('span', { style:{ fontSize:'11px', fontWeight:700, color:'#94A3B8', textTransform:'uppercase', letterSpacing:'0.05em' }},
              activeTab === 'anatomy' ? `Document Anatomy — ` : 'Field Registry'
            ),
            activeTab === 'anatomy' && React.createElement('span', { style:{ fontSize:'11px', fontWeight:700, color:'#3B82F6' }}, selected.label)
          ),
          activeTab === 'anatomy' && React.createElement('div', { style:{ display:'flex', gap:'6px' }},
            TEMPLATES.map(t =>
              React.createElement('button', {
                key:t.id,
                'data-testid': `quick-btn-${t.id}`,
                onClick: () => setSelectedId(t.id),
                title: t.label,
                style:{
                  width:'24px', height:'24px', borderRadius:'50%', border:'2px solid',
                  borderColor: t.id === selectedId ? '#3B82F6' : 'transparent',
                  background: RISK_COLOR[t.seIntel?.risk || 'Low'] + '33',
                  cursor:'pointer', fontSize:'9px', fontWeight:700,
                  color: RISK_COLOR[t.seIntel?.risk || 'Low']
                }
              }, (TEMPLATES.indexOf(t)+1))
            )
          )
        ),

        // Content area
        React.createElement('div', { style:{ flex:1, overflow:'auto', padding:activeTab === 'anatomy' ? '0' : '20px' }},
          activeTab === 'anatomy'
            ? React.createElement(DocumentView, { key: selected.id, template: selected })
            : React.createElement(MasterFieldList, { templates: TEMPLATES })
        )
      )
    );
  }

  const rootEl = document.getElementById('root'); const reactRoot = ReactDOM.createRoot(rootEl); reactRoot.render(React.createElement(App));
</script>
</body>
</html>
